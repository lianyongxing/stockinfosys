async function fetchQuotes() {
  if (!requireLocalMode('获取基本面最新价')) return;
  if (!basicsData || !basicsData.length) {
    alert('暂无基本面数据');
    return;
  }
  const codes = basicsData.map(s => s.code);
  try {
    const res = await fetch(apiPath('api/quote') + '?codes=' + codes.join('&codes='));
    const data = await res.json();
    if (data.error) {
      alert(data.error);
      return;
    }
    const quotes = {};
    for (const [code, q] of Object.entries(data)) {
      quotes[code] = { price: q.price, change_percent: q.change_percent };
    }
    quotesCache = quotes;
    localStorage.setItem('quotes_cache', JSON.stringify(quotes));
    const now = new Date();
    const timeStr = now.toISOString().slice(0, 16);
    await syncToFile('basics/quotes.json', { quotes: quotes, update_time: timeStr });
    renderBasics();
    alert('价格已更新');
  } catch (e) {
    alert('获取失败: ' + e.message);
  }
}

async function fetchTradeQuotes() {
  if (!requireLocalMode('获取交易最新价')) return;
  if (!allRecords || !allRecords.length) {
    alert('暂无交易数据');
    return;
  }
  const codes = [...new Set(allRecords.map(r => r.stock_code).filter(c => c && c.length === 6))];
  if (!codes.length) {
    alert('无有效股票代码');
    return;
  }
  try {
    let data = {};
    const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    if (isLocal) {
      const res = await fetch(apiPath('api/quote') + '?codes=' + codes.join('&codes='));
      data = await res.json();
      if (data.error) { alert(data.error); return; }
    } else {
      const chunkSize = 50;
      for (let i = 0; i < codes.length; i += chunkSize) {
        const chunk = codes.slice(i, i + chunkSize);
        const param = chunk.map(c => 'code_' + c + '.SH,SZ').join(',');
        try {
          const res = await fetch('http://hq.sinajs.cn/list=' + param, { headers: { 'Referer': 'http://finance.sina.com.cn' } });
          const text = await res.text();
          const lines = text.split('\n');
          for (const line of lines) {
            const m = line.match(/="([^"]+)"/);
            if (m) {
              const parts = line.split('=')[0].split('_');
              const code = parts[parts.length - 1];
              const fields = m[1].split(',');
              if (fields[1] && !isNaN(fields[1])) {
                const price = parseFloat(fields[1]);
                const prevClose = parseFloat(fields[2]) || price;
                const change = price - prevClose;
                const changePercent = prevClose ? (change / prevClose * 100) : 0;
                data[code] = { price, change_percent: parseFloat(changePercent.toFixed(2)), name: fields[0].replace(/^[^"]*"/, '') };
              }
            }
          }
        } catch(e) { console.log('chunk failed:', e); }
      }
    }
    tradeQuotesCache = data;
    localStorage.setItem('trade_quotes_cache', JSON.stringify(data));
    const now = new Date();
    const timeStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    localStorage.setItem('trade_quote_time', timeStr);
    document.getElementById('quote-time').textContent = '价格更新: ' + timeStr;
    await syncToFile('trade/quotes.json', { quotes: data, update_time: timeStr });
    await fetch(apiPath('api/update-trade-quotes'), { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) }).catch(() => {});
    renderPage();
    alert('交易价格已更新');
  } catch (e) {
    alert('获取失败: ' + e.message);
  }
}

function renderBasics() {
  const q = normalizeSearchText(document.getElementById('basics-search').value);
  const sw1 = document.getElementById('sw1-filter').value;
  const sw2 = document.getElementById('sw2-filter').value;
  const sw3 = document.getElementById('sw3-filter').value;
  basicsData = basicsData.map(enrichStockRecord);
  const filtered = basicsData.filter(s => {
    if (sw1 && s.sw_lv1 !== sw1) return false;
    if (sw2 && s.sw_lv2 !== sw2) return false;
    if (sw3 && s.sw_lv3 !== sw3) return false;
    if (q && !(matchesSearchText(s.full_code, q) || matchesSearchText(s.code, q) || matchesSearchText(s.name, q) || matchesSearchText(s.business, q) || matchesSearchText(s.industry, q) || matchesSearchText(s.sw_lv1, q) || matchesSearchText(s.sw_lv2, q) || matchesSearchText(s.sw_lv3, q))) return false;
    return true;
  });
  const total = filtered.length;
  const totalPages = Math.ceil(total / basicsPageSize) || 1;
  if (basicsPage > totalPages) basicsPage = totalPages;
  if (basicsPage < 1) basicsPage = 1;
  const start = (basicsPage - 1) * basicsPageSize;
  const pageItems = filtered.slice(start, start + basicsPageSize);
  document.getElementById('basics-table').innerHTML = pageItems.map((s, idx) => {
    const price = s.price || '';
    const priceStr = price ? (parseFloat(price) >= 100 ? parseFloat(price).toFixed(2) : parseFloat(price).toFixed(2)) : '-';
    const stars = Array(5).fill(0).map((_, i) => {
      const clickAttr = isLocalMode ? ' onclick="event.stopPropagation();setStockRating(\'' + s.full_code + '\',' + (i+1) + ')"' : '';
      const cursor = isLocalMode ? 'pointer' : 'default';
      return '<span style="color:' + (i < (s.rating || 0) ? '#f1c40f' : '#ddd') + ';font-size:12px;cursor:' + cursor + ';"' + clickAttr + '>★</span>';
    }).join('');
    const swLabel = [s.sw_lv1, s.sw_lv2, s.sw_lv3].filter(v => v && v !== '-').join(' / ') || '-';
    return '<tr onclick="showDetailByCode(\'' + s.code + '\')" style="cursor:pointer;"><td>' + s.full_code + '</td><td>' + s.name + '</td><td><span class="sw-pill" title="' + esc(swLabel) + '">' + esc(swLabel) + '</span></td><td>' + (s.industry || '-') + '</td><td style="font-weight:bold;">' + priceStr + '</td><td>' + (s.market_cap || '-') + '</td><td>' + (s.profit || '-') + '</td><td>' + (s.gross_margin || '-') + '</td><td>' + (s.net_margin || '-') + '</td><td>' + (s.pe || '-') + '</td><td>' + stars + '</td></tr>';
  }).join('');
  const pag = document.getElementById('basics-pagination');
  if (pag) {
    const btn = (n, label, disabled, active) => '<button onclick="setBasicsPage(' + n + ')" ' + (disabled ? 'disabled' : '') + ' style="padding:5px 9px;border:1px solid ' + (active ? '#2563eb' : '#d9e2ec') + ';border-radius:6px;background:' + (active ? '#2563eb' : '#fff') + ';color:' + (active ? '#fff' : (disabled ? '#cbd5e1' : '#475569')) + ';cursor:' + (disabled ? 'default' : 'pointer') + ';font-weight:' + (active ? '600' : '400') + ';">' + label + '</button>';
    let html = '<span>' + total + ' 只股票</span>';
    if (totalPages > 1) {
      html += btn(1, '«', basicsPage <= 1, false) + btn(basicsPage - 1, '‹', basicsPage <= 1, false);
      const maxShow = 5, half = 2;
      let startP = Math.max(1, basicsPage - half);
      let endP = Math.min(totalPages, startP + maxShow - 1);
      if (endP - startP + 1 < maxShow) startP = Math.max(1, endP - maxShow + 1);
      if (startP > 1) html += '<span style="color:#94a3b8;padding:0 2px;">…</span>';
      for (let p = startP; p <= endP; p++) html += btn(p, p, false, p === basicsPage);
      if (endP < totalPages) html += '<span style="color:#94a3b8;padding:0 2px;">…</span>';
      html += btn(basicsPage + 1, '›', basicsPage >= totalPages, false) + btn(totalPages, '»', basicsPage >= totalPages, false);
      html += '<span style="margin-left:8px;">第 ' + basicsPage + ' / ' + totalPages + ' 页</span>';
    }
    html += '<span style="margin-left:auto;display:flex;align-items:center;gap:4px;">每页<select onchange="setBasicsPageSize(this.value)" style="padding:2px 6px;border:1px solid #d9e2ec;border-radius:5px;font-size:12px;margin:0 2px;">' + [20,50,100].map(n => '<option value="' + n + '"' + (n === basicsPageSize ? ' selected' : '') + '>' + n + '</option>').join('') + '</select>条</span>';
    pag.innerHTML = html;
  }
}

    ? '<span style="font-size:13px;padding:3px 9px;border-radius:999px;background:' + (chg >= 0 ? '#dcfce7' : '#fef2f2') + ';color:' + (chg >= 0 ? '#16a34a' : '#dc2626') + ';margin-left:8px;">' + (chg >= 0 ? '+' : '') + chg.toFixed(2) + '%</span>'
    : '';
  document.getElementById('detail-content').innerHTML =
    '<button onclick="goToDetailSearch()" style="padding:8px 18px;background:#2563eb;color:#fff;border:none;border-radius:999px;cursor:pointer;margin-bottom:18px;font-size:13px;">← 返回搜索</button>' +
    '<div style="background:#fff;padding:24px;border-radius:16px;box-shadow:0 8px 28px rgba(15,23,42,0.08);display:flex;gap:24px;align-items:flex-start;">' +
      '<div style="width:400px;flex-shrink:0;">' +
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;">' +
          '<div>' +
            '<h2 style="margin:0 0 6px;color:#0f172a;font-size:20px;">' + esc(s.name) + ' <span style="color:#94a3b8;font-size:15px;font-weight:400;">(' + esc(s.full_code || s.code) + ')</span></h2>' +
            '<div>' + stars + '</div>' +
          '</div>' +
          '<div style="text-align:right;">' + priceHtml + chgHtml + '</div>' +
        '</div>' +
        '<div style="margin-bottom:14px;">' + (tagsHtml || '<span class="muted" style="font-size:13px;">暂无标签</span>') + '</div>' +
        '<div style="background:#f8fbff;border:1px solid #e6eef8;border-radius:12px;padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;font-size:13px;margin-bottom:14px;">' +
          '<div><span class="muted">申万行业</span><div style="margin-top:3px;"><span class="sw-pill" style="font-size:12px;">' + swLabel + '</span></div></div>' +
          '<div><span class="muted">行业定位</span><div style="margin-top:3px;color:#334155;">' + esc(s.industry && s.industry !== '-' ? s.industry : (reportItem ? extractIndustry(reportItem.content) : '-')) + '</div></div>' +
          '<div><span class="muted">总市值</span><div style="margin-top:3px;font-weight:500;">' + esc(s.market_cap || '-') + '</div></div>' +
          '<div><span class="muted">PE</span><div style="margin-top:3px;font-weight:500;">' + esc(s.pe || '-') + '</div></div>' +
          '<div><span class="muted">净利润</span><div style="margin-top:3px;font-weight:500;">' + esc(s.profit || '-') + '</div></div>' +
          '<div><span class="muted">毛利率</span><div style="margin-top:3px;font-weight:500;">' + esc(s.gross_margin || '-') + '</div></div>' +
          '<div><span class="muted">净利率</span><div style="margin-top:3px;font-weight:500;">' + esc(s.net_margin || '-') + '</div></div>' +
          '<div><span class="muted">扣非净利率</span><div style="margin-top:3px;font-weight:500;">' + esc(s.deduct_net_margin || '-') + '</div></div>' +
        '</div>' +
        '<div style="font-size:13px;">' +
          '<div class="muted" style="margin-bottom:6px;">主营业务</div>' +
          '<div style="line-height:1.75;color:#334155;">' + esc(s.business || '-') + '</div>' +
        '</div>' +
        transferInfo +
      '</div>' +
      '<div style="flex:1;min-width:0;border-left:1px solid #eef2f7;padding-left:24px;">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">' +
          '<h3 style="margin:0;color:#0f172a;font-size:15px;">研究报告</h3>' +
          '<span class="basic-chip">Markdown</span>' +
        '</div>' +
        '<div style="height:calc(100vh - 280px);overflow-y:auto;background:linear-gradient(180deg,#fafcff 0%,#f8fafc 100%);padding:16px;border-radius:12px;border:1px solid #eef2f7;">' +
          reportContent +
        '</div>' +
      '</div>' +
    '</div>';
}

function goToDetailSearch() {
  document.getElementById('detail-content').style.display = 'none';
  document.getElementById('detail-search-list').style.display = 'flex';
  renderDetailTable();
}

function backToList() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('basics-header').style.display = 'flex';
  document.getElementById('back-btn').style.display = 'none';
}

let parsedData = {};

function showAddForm() {
  if (!requireLocalMode('新增股票')) return;
  document.getElementById('add-form').style.display = 'block';
  document.getElementById('add-json').value = '';
  document.getElementById('parsed-fields').innerHTML = '';
  parsedData = {};
}

function parseJson() {
  try {
    const jsonStr = document.getElementById('add-json').value.trim();
    parsedData = JSON.parse(jsonStr);
    const fields = document.getElementById('parsed-fields');
    const keys = ['code','name','industry','business','advantage','competitor','market_cap','profit','gross_margin','net_margin','deduct_net_margin','pe','founded','employees','revenue','assets','description'];
    fields.innerHTML = keys.map(k => '<input data-key="' + k + '" placeholder="' + k + '" value="' + (parsedData[k] || '') + '" style="width:80px;padding:6px;">').join('');
  } catch (e) {
    alert('JSON解析失败: ' + e.message);
  }
}

async function addStock() {
  if (!requireLocalMode('保存股票')) return;
  const inputs = document.querySelectorAll('#parsed-fields input');
  const newStock = {};
  inputs.forEach(inp => {
    newStock[inp.getAttribute('data-key')] = inp.value.trim();
  });
  if (!newStock.code || !newStock.name) {
    alert('代码和名称不能为空');
    return;
  }
  newStock.change_percent = newStock.change_percent || '';
  newStock.sw_lv1 = newStock.sw_lv1 || '-';
  newStock.sw_lv2 = newStock.sw_lv2 || '-';
  newStock.sw_lv3 = newStock.sw_lv3 || '-';
  newStock.sw_industry = newStock.sw_industry || (newStock.sw_lv3 || newStock.sw_lv2 || newStock.sw_lv1 || '-');
  basicsData.push(newStock);
  renderBasics();
  document.getElementById('add-form').style.display = 'none';
  saveBasics();
  await persistStockDb();
}

function deleteStock(code) {
  if (!requireLocalMode('删除股票')) return;
  if (!confirm('确定删除？')) return;
  var idx = basicsData.findIndex(function(s) { return s.code === code; });
  if (idx >= 0) {
    basicsData.splice(idx, 1);
  }
  localStorage.setItem('stock_basics', JSON.stringify(basicsData));
  renderBasics();
  persistStockDb();
}

function saveBasics() {
  localStorage.setItem('stock_basics', JSON.stringify(basicsData));
}

function doBasicsFilter() {
  basicsPage = 1;
  renderBasics();
}

function setBasicsPage(n) {
  const total = filteredRecords.length;
  const totalPages = Math.ceil(total / basicsPageSize) || 1;
  basicsPage = Math.max(1, Math.min(n, totalPages));
  renderBasics();
}

function setBasicsPageSize(val) {
  basicsPageSize = parseInt(val, 10) || 50;
  basicsPage = 1;
  renderBasics();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    updateReadOnlyUI();
    init();
  });
} else {
  updateReadOnlyUI();
  init();
}
  </script>
</body>
</html>
