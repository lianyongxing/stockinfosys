<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>股权报告提取结果</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; color: #333; display: flex; }
    .sidebar { width: 120px; background: linear-gradient(180deg, #2c3e50 0%, #1a252f 100%); min-height: 100vh; padding-top: 60px; box-shadow: 2px 0 8px rgba(0,0,0,0.1); position: fixed; left: 0; top: 0; z-index: 100; }
    .sidebar .nav-item { padding: 14px 16px; color: #fff; cursor: pointer; font-size: 14px; border-radius: 8px; margin: 4px 8px; transition: all 0.2s; opacity: 0.7; }
    .sidebar .nav-item:hover { background: rgba(255,255,255,0.1); opacity: 1; }
    .sidebar .nav-item.active { background: #3498db; opacity: 1; box-shadow: 0 2px 8px rgba(52,152,219,0.3); }
    .main { flex: 1; margin-left: 120px; }
    .header { background: #2c3e50; color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .actions { display: flex; gap: 8px; align-items: center; font-size: 12px; opacity: 0.7; }
    .toolbar { background: #fff; padding: 12px 24px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; border-bottom: 1px solid #e1e4e8; }
    .toolbar input[type="text"] { padding: 6px 10px; border: 1px solid #d1d5da; border-radius: 4px; font-size: 14px; width: 200px; }
    .toolbar button { padding: 6px 14px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; background: #3498db; color: #fff; }
    .toolbar button:hover { background: #2980b9; }
    .toolbar button.active { background: #2ecc71; }
    .filter-group { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
    .filter-group label { font-size: 13px; display: flex; align-items: center; gap: 2px; cursor: pointer; }
    .filter-group input[type="checkbox"] { cursor: pointer; }
    .filter-group select { padding: 6px 10px; border: 1px solid #d1d5da; border-radius: 4px; font-size: 14px; }
    .stats { background: #ecf0f1; padding: 8px 24px; font-size: 13px; color: #555; border-bottom: 1px solid #e1e4e8; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; background: #fff; font-size: 13px; min-width: 980px; }
    th { background: linear-gradient(180deg, #f8fbff 0%, #eef4fa 100%); padding: 10px 10px; text-align: left; font-weight: 600; border-bottom: 2px solid #dee2e6; position: sticky; top: 0; z-index: 10; white-space: nowrap; cursor: pointer; }
    th:hover { background: #e9ecef; }
    th span.sort-indicator { opacity: 0.3; font-size: 10px; margin-left: 2px; }
    th.sorted span.sort-indicator { opacity: 1; color: #3498db; }
    td { padding: 10px 10px; border-bottom: 1px solid #f1f1f1; vertical-align: middle; max-width: 220px; }
    tr:hover td { background: #f8f9ff; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 500; white-space: nowrap; }
    .tag-stage-预告期 { background: #e8f5e9; color: #2e7d32; }
    .tag-stage-定价期 { background: #fff8e1; color: #f57f17; }
    .tag-stage-成交期 { background: #e3f2fd; color: #1565c0; }
    .tag-stage-定增 { background: #fce4ec; color: #c62828; }
    .tag-stage-未知阶段 { background: #f5f5f5; color: #999; }
    .tag-doc-询价转让 { background: #e8eaf6; color: #3949ab; }
    .tag-doc-定增 { background: #f3e5f5; color: #7b1fa2; }
    .tag-doc-公告 { background: #e0e0e0; color: #616161; }
    .cell-stock { font-weight: 500; }
    .cell-code { color: #666; font-weight: 400; }
    .cell-date { white-space: nowrap; font-family: monospace; }
    .cell-price { font-family: monospace; font-weight: 500; }
    .sw-pill { display: inline-block; padding: 3px 8px; border-radius: 999px; background: #edf4ff; color: #285680; font-size: 12px; line-height: 1.2; }
    .muted { color: #8a8f98; }
    .basic-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 16px rgba(15, 23, 42, 0.06); overflow: hidden; }
    .basic-toolbar { background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%); padding: 14px 18px; border-bottom: 1px solid #edf2f7; }
    .basic-toolbar .group { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .basic-toolbar input, .basic-toolbar select { padding: 8px 10px; border: 1px solid #d9e2ec; border-radius: 8px; font-size: 13px; background: #fff; }
    .basic-toolbar input:focus, .basic-toolbar select:focus { outline: none; border-color: #8ab4f8; box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.12); }
    .basic-toolbar button { padding: 8px 14px; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; color: #fff; transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease; }
    .basic-toolbar button:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(15, 23, 42, 0.12); }
    .basic-toolbar button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
    .basic-btn-primary { background: #2563eb; }
    .basic-btn-accent { background: #0ea5e9; }
    .basic-btn-warm { background: #f59e0b; }
    .basic-btn-purple { background: #8b5cf6; }
    .basic-btn-slate { background: #64748b; }
    .basic-btn-success { background: #2ecc71; }
    .basic-chip { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 999px; background: #f1f5f9; color: #334155; font-size: 12px; }
    .stats-panel { padding: 14px 18px; background: linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%); border-bottom: 1px solid #e6eef8; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .stat-card { background: rgba(255,255,255,0.9); border: 1px solid rgba(148,163,184,0.18); border-radius: 12px; padding: 12px 14px; backdrop-filter: blur(6px); }
    .stat-label { font-size: 12px; color: #64748b; margin-bottom: 6px; }
    .stat-value { font-size: 20px; font-weight: 700; color: #0f172a; }
    .stat-sub { font-size: 12px; color: #64748b; margin-top: 4px; }
    .stat-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .mini-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; background: #fff; border: 1px solid #dbe7f3; font-size: 12px; color: #334155; }
    .mini-pill strong { color: #0f172a; }
    .bar-chart { margin-top: 14px; display: grid; gap: 8px; }
    .bar-row { display: grid; grid-template-columns: 120px 1fr 42px; gap: 10px; align-items: center; }
    .bar-name { font-size: 12px; color: #334155; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { height: 10px; border-radius: 999px; background: #dbeafe; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #3b82f6 0%, #06b6d4 100%); }
    .bar-count { font-size: 12px; color: #0f172a; text-align: right; }
    .rank-list { display: grid; gap: 8px; margin-top: 10px; }
    .rank-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 12px; border: 1px solid #e6eef8; border-radius: 12px; background: #fff; cursor: pointer; transition: all .15s ease; }
    .rank-item:hover { border-color: #bfdbfe; box-shadow: 0 6px 18px rgba(59,130,246,0.08); transform: translateY(-1px); }
    .rank-left { min-width: 0; }
    .rank-name { font-size: 13px; font-weight: 600; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rank-meta { font-size: 11px; color: #64748b; margin-top: 2px; }
    .rank-count { font-size: 13px; font-weight: 700; color: #2563eb; white-space: nowrap; }
    .industry-preview { display: grid; grid-template-columns: repeat(auto-fill,minmax(180px,1fr)); gap: 10px; margin-top: 10px; }
    .industry-stock { padding: 10px 12px; border-radius: 12px; background: #fff; border: 1px solid #e6eef8; cursor: pointer; transition: all .15s ease; }
    .industry-stock:hover { border-color: #bfdbfe; box-shadow: 0 6px 18px rgba(59,130,246,0.08); }
    .industry-stock-name { font-size: 13px; font-weight: 600; color: #0f172a; }
    .industry-stock-code { font-size: 11px; color: #64748b; margin-top: 2px; }
    .reports-shell { display: grid; grid-template-columns: 280px 1fr; gap: 20px; align-items: start; }
    .reports-sidebar, .reports-main-panel { background: #fff; border-radius: 14px; box-shadow: 0 8px 24px rgba(15,23,42,0.06); overflow: hidden; }
    .reports-sidebar { position: sticky; top: 18px; }
    .reports-head { padding: 16px 18px; border-bottom: 1px solid #eef2f7; background: linear-gradient(180deg, #fff 0%, #f8fbff 100%); }
    .reports-head h3 { margin: 0 0 8px; color: #0f172a; font-size: 16px; }
    .reports-controls { padding: 14px 18px; display: grid; gap: 10px; }
    .reports-controls input, .reports-controls select { width: 100%; padding: 9px 10px; border: 1px solid #d9e2ec; border-radius: 10px; font-size: 13px; }
    .reports-controls input:focus, .reports-controls select:focus { outline: none; border-color: #8ab4f8; box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.12); }
    .reports-toc { padding: 10px 12px 14px; max-height: calc(100vh - 440px); overflow-y: auto; }
    .report-card { position: relative; padding: 18px 18px 16px; background: #fff; border: 1px solid #edf2f7; border-radius: 16px; box-shadow: 0 2px 8px rgba(15,23,42,0.04); cursor: pointer; transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease; }
    .report-card:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(15,23,42,0.08); border-color: #d7e3f3; }
    .report-title { margin: 0 0 8px; color: #0f172a; font-size: 18px; }
    .report-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .report-preview { color: #475569; font-size: 14px; line-height: 1.7; }
    .report-detail-card { background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(15,23,42,0.08); padding: 18px; }
    .report-list-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 18px; margin-top: 0; }
    .loading { text-align: center; padding: 40px; color: #666; }
    .error-row td { background: #ffebee; }
    .skipped-row td { background: #f5f5f5; color: #999; }
    .pagination { padding: 12px 24px; display: flex; gap: 8px; justify-content: center; align-items: center; }
    .pagination button { padding: 6px 12px; border: 1px solid #d1d5da; border-radius: 4px; background: #fff; cursor: pointer; }
    .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
    .pagination .info { color: #666; font-size: 13px; }
    .page-size-select { padding: 4px 8px; border: 1px solid #d1d5da; border-radius: 4px; font-size: 13px; }
    .basics-header { margin-bottom: 12px; }
    #basics-table th, #basics-table td { padding: 10px 12px; border: 1px solid #e1e4e8; }
    #basics-table th { background: #f8f9fa; font-weight: 600; }
    .markdown-body { line-height: 1.8; font-size: 15px; color: #24292e; }
    .markdown-body h1 { font-size: 28px; font-weight: 600; margin: 24px 0 16px; padding-bottom: 8px; border-bottom: 1px solid #eaecef; color: #1f2328; }
    .markdown-body h2 { font-size: 22px; font-weight: 600; margin: 20px 0 12px; padding-bottom: 6px; border-bottom: 1px solid #eaecef; color: #1f2328; }
    .markdown-body h3 { font-size: 18px; font-weight: 600; margin: 16px 0 10px; color: #1f2328; }
    .markdown-body h4 { font-size: 16px; font-weight: 600; margin: 14px 0 8px; }
    .markdown-body p { margin: 12px 0; }
    .markdown-body ul, .markdown-body ol { margin: 12px 0; padding-left: 24px; }
    .markdown-body li { margin: 4px 0; }
    .markdown-body code { background: #f6f8fa; padding: 2px 6px; border-radius: 4px; font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: 13px; }
    .markdown-body pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto; font-size: 13px; line-height: 1.45; }
    .markdown-body pre code { background: transparent; padding: 0; }
    .markdown-body blockquote { border-left: 4px solid #d0d7de; margin: 12px 0; padding: 0 16px; color: #6e7781; }
    .markdown-body table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    .markdown-body th, .markdown-body td { border: 1px solid #d0d7de; padding: 8px 12px; text-align: left; }
    .markdown-body th { background: #f6f8fa; font-weight: 600; }
    .markdown-body tr:nth-child(even) { background: #f6f8fa; }
    .markdown-body hr { height: 2px; background: #d0d7de; margin: 20px 0; border: none; }
    .markdown-body a { color: #0969da; text-decoration: none; }
    .markdown-body a:hover { text-decoration: underline; }
    .markdown-body strong { font-weight: 600; }
    .markdown-body em { font-style: italic; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="nav-item" onclick="switchTab('detail', this)">信息查询</div>
    <div class="nav-item" onclick="switchTab('basics', this)">基本面</div>
    <div class="nav-item" onclick="switchTab('industry', this)">行业分析</div>
    <div class="nav-item" onclick="switchTab('trade', this)">股权转让</div>
    <div class="nav-item" onclick="switchTab('reports', this)">研究报告</div>
  </div>
  <div class="main">
    <div class="header">
      <h1 id="page-title">股权报告提取结果</h1>
      <div class="actions">
        <span id="update-time"></span>
        <br>
        <span id="quote-time" style="font-size:11px;color:#ddd;"></span>
      </div>
    </div>
    <div id="sw-stats" style="display:none;"></div>

  <div class="toolbar">
    <input type="text" id="search-input" placeholder="搜索..." oninput="doFilter()" style="width:120px;">
    <span style="font-size:13px;margin-right:4px;">阶段:</span>
    <select id="stage-filter" onchange="doFilter()" style="width:100px;">
      <option value="">全部</option>
      <option value="定价期">定价期</option>
      <option value="成交期">成交期</option>
      <option value="定增">定增</option>
    </select>
    <span style="font-size:13px;margin-left:8px;margin-right:4px;">类型:</span>
    <select id="doctype-filter" onchange="doFilter()" style="width:100px;">
      <option value="">全部</option>
      <option value="询价转让">询价转让</option>
      <option value="定增">定增</option>
    </select>
    <span style="font-size:13px;margin-left:8px;margin-right:4px;">日期:</span>
      <select id="date-range" onchange="applyDateRange()"></select>
      <script>
        (function initDateOptions() {
          const sel = document.getElementById('date-range');
          const now = new Date();
          const year = now.getFullYear();
          const month = now.getMonth() + 1;
          const opts = [
            {value: '', text: '全部'},
            {value: '7', text: '近7天'},
            {value: '30', text: '近30天'},
            {value: '90', text: '近90天'}
          ];
          for (let m = month; m >= 1; m--) {
            const v = year + '-' + String(m).padStart(2, '0');
            opts.push({value: v, text: year + '年' + m + '月'});
          }
          for (let y = year - 1; y >= year - 2; y--) {
            opts.push({value: String(y), text: y + '年'});
          }
          sel.innerHTML = opts.map(o => '<option value="' + o.value + '">' + o.text + '</option>').join('');
        })();
      </script>
    <input type="text" id="recipient-filter" placeholder="受让方..." oninput="doFilter()" style="width:120px;margin-left:auto;">
    <button id="trade-quotes-btn" onclick="fetchTradeQuotes()" style="padding:6px 14px;background:#9b59b6;color:#fff;border:none;border-radius:4px;font-size:14px;cursor:pointer;">获取最新价</button>
    <button onclick="clearFilters()">清除筛选</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('date')">日期<span class="sort-indicator">▴▾</span></th>
          <th onclick="sortBy('stock')">股票(代码)<span class="sort-indicator">▴▾</span></th>
          <th onclick="sortBy('stage')">阶段<span class="sort-indicator">▴▾</span></th>
          <th onclick="sortBy('doc_type')">类型<span class="sort-indicator">▴▾</span></th>
          <th onclick="sortBy('price')">每股价格<span class="sort-indicator">▴▾</span></th>
          <th>总金额</th>
          <th onclick="sortBy('unlock')">解禁日期<span class="sort-indicator">▴▾</span></th>
          <th>受让方</th>
          <th>LLM输出</th>
        </tr>
      </thead>
      <tbody id="table-container"></tbody>
    </table>
  </div>

  <div class="pagination">
    <button id="prev-btn" onclick="prevPage()">上一页</button>
    <span class="info" id="page-info"></span>
    <button id="next-btn" onclick="nextPage()">下一页</button>
    <select class="page-size-select" id="page-size" onchange="changePageSize()">
      <option value="10" selected>10条/页</option>
      <option value="20">20条/页</option>
      <option value="50">50条/页</option>
      <option value="100">100条/页</option>
      <option value="200">200条/页</option>
    </select>
  </div>

  <div id="basics-view" style="display:none;padding:20px;background:#f5f7fa;min-height:calc(100vh - 60px);">
    <button onclick="backToList()" style="padding:8px 16px;background:#3498db;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-bottom:16px;display:none;" id="back-btn">< 返回列表</button>
    <div id="detail-view" style="display:none;"></div>
      <div id="list-view">
      <div class="basic-card">
      <div id="basics-header" class="basic-toolbar">
        <div class="group">
        <input type="text" id="basics-search" placeholder="搜索代码 / 名称 / 行业" oninput="doBasicsFilter()" style="width:220px;">
        <select id="sw1-filter" onchange="onSw1Change();doBasicsFilter()"><option value="">申万一级</option></select>
        <select id="sw2-filter" onchange="onSw2Change();doBasicsFilter()"><option value="">申万二级</option></select>
        <select id="sw3-filter" onchange="doBasicsFilter()"><option value="">申万三级</option></select>
        <button id="add-stock-btn" class="basic-btn-primary" onclick="showAddForm()">+新增</button>
        <button class="basic-btn-warm" onclick="reloadBasics()">刷新</button>
        <button class="basic-btn-accent" onclick="syncSwFromDb()" title="从 stocks_db.json 补全申万行业、行业定位等字段">同步行业数据</button>
        <button id="basics-quotes-btn" class="basic-btn-purple" onclick="fetchQuotes()">获取最新价</button>
        <button class="basic-btn-slate" onclick="clearBasicsFilter()">清除筛选</button>
        </div>
      </div>
      <div id="add-form" style="display:none;background:#f8f9fa;padding:12px;margin-bottom:12px;border-radius:8px;">
        <div style="margin-bottom:8px;">
          <textarea id="add-json" placeholder='{"code":"300789","name":"唐源电气",...}' style="width:100%;height:60px;padding:6px;font-size:12px;font-family:monospace;"></textarea>
          <button onclick="parseJson()" style="padding:4px 10px;background:#3498db;color:#fff;border:none;border-radius:4px;font-size:12px;cursor:pointer;margin-top:4px;">解析</button>
        </div>
        <div id="parsed-fields" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
        <div style="margin-top:8px;">
          <button onclick="addStock()" style="padding:4px 10px;background:#2ecc71;color:#fff;border:none;border-radius:4px;font-size:12px;cursor:pointer;">保存</button>
          <button onclick="hideAddForm()" style="padding:4px 10px;background:#999;color:#fff;border:none;border-radius:4px;font-size:12px;cursor:pointer;">取消</button>
        </div>
      </div>
      <table style="margin-top:0;">
        <thead>
          <tr><th>代码</th><th>名称</th><th>申万行业</th><th>行业定位</th><th>现价</th><th>市值</th><th>净利润</th><th>毛利率</th><th>净利率</th><th>PE</th><th>评分</th></tr>
        </thead>
        <tbody id="basics-table"></tbody>
      </table>
      <div id="basics-pagination" style="margin-top:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px;color:#475569;"></div>
      </div>
      </div>
  </div>

  <div id="industry-analysis-view" style="display:none;padding:20px;background:#f5f7fa;min-height:calc(100vh - 60px);">
    <div style="max-width:1400px;margin:0 auto;">
      <!-- 标题 + 操作行 -->
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;">
        <div style="flex:1;min-width:0;">
          <h2 style="margin:0 0 2px;color:#0f172a;">行业分析</h2>
          <div class="muted" style="font-size:12px;">申万行业覆盖与分布分析（基于已研究股票）</div>
        </div>

let allRecords = [];

let filteredRecords = [];
let currentPage = 1;
let pageSize = 20;
let sortColumn = null;
let sortAsc = false;

let basicsPageSize = 20;
let dateRange = { from: "", to: "" };
let detailIndustryFilter = '';
let allStocksData = [];
let detailFilteredStocks = [];
let detailPage = 1;
let detailPageSize = 20;
const isLocalMode = ['localhost', '127.0.0.1'].includes(window.location.hostname);

function staticPath(path) {
  return path.replace(/^\/+/, '');
}

function apiPath(path) {
  return path.startsWith('/') ? path : '/' + path;
}

function requireLocalMode(actionText) {
  if (isLocalMode) return true;
  alert(actionText + ' 仅支持本地模式，远端页面仅用于展示。');
  return false;
}

function esc(s) {
  if (s == null) return "";
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, '&quot;');
}

function normalizeSearchText(value) {
  return String(value == null ? '' : value).trim().toLowerCase();
}

const pinyinCharMap = {
  乐: 'le', 鑫: 'xin', 科: 'ke', 技: 'ji', 安: 'an', 生: 'sheng', 物: 'wu', 医: 'yi', 药: 'yao', 结: 'jie', 果: 'guo', 美: 'mei', 亚: 'ya', 光: 'guang', 电: 'dian', 华: 'hua', 润: 'run', 江: 'jiang', 中: 'zhong', 微: 'wei', 传: 'chuan', 媒: 'mei', 网: 'wang', 易: 'yi', 富: 'fu', 龙: 'long', 海: 'hai', 尔: 'er', 讯: 'xun', 立: 'li', 思: 'si', 瑞: 'rui', 新: 'xin', 冠: 'guan', 芯: 'xin', 片: 'pian', 半: 'ban', 导: 'dao', 研: 'yan', 报: 'bao', 告: 'gao', 证: 'zheng', 券: 'quan', 银: 'yin', 行: 'hang'
};

function buildPinyinIndex(value) {
  const text = normalizeSearchText(value);
  if (!text) return '';
  let result = '';
  for (const ch of text) {
    if (/[a-z0-9]/.test(ch)) {
      result += ch;
    } else if (pinyinCharMap[ch]) {
      result += pinyinCharMap[ch];
    }
  }
  return result;
}

function matchesSearchText(value, query) {
  const text = normalizeSearchText(value);
  if (!query) return true;
  if (text.includes(query)) return true;
  const lettersOnly = query.replace(/[^a-z0-9]/g, '');
  if (!lettersOnly) return false;
  return buildPinyinIndex(value).includes(lettersOnly);
}

async function syncToFile(path, data) {
  if (!isLocalMode) {
    if (path === 'trade/quotes.json') {
      const q = data.quotes || data;
      const existing = JSON.parse(localStorage.getItem('trade_quotes_cache') || '{}');
      Object.assign(existing, q);
      localStorage.setItem('trade_quotes_cache', JSON.stringify(existing));
    }
    return;
  }
  try {
    const res = await fetch(apiPath('user_data/' + path), {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error('API failed');
  } catch(e) {
    if (path === 'trade/quotes.json') {
      const q = data.quotes || data;
      const existing = JSON.parse(localStorage.getItem('trade_quotes_cache') || '{}');
      Object.assign(existing, q);
      localStorage.setItem('trade_quotes_cache', JSON.stringify(existing));
    }
  }
}

async function loadFromFile(path) {
  try {
    const res = await fetch(staticPath('user_data/' + path));
    if (res.ok) return await res.json();
  } catch(e) {}
  if (isLocalMode) {
    try {
      const res = await fetch(apiPath('user_data/' + path));
      if (res.ok) return await res.json();
    } catch(e) {}
  }
  return {};
}

function getLocalData(key, defaultVal) {
  const local = localStorage.getItem(key);
  return local ? JSON.parse(local) : defaultVal;
}

function setLocalData(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}

async function init() {
  console.log("init starting...");
  try {
    const res = await fetch("data.json");
    console.log("fetched:", res.ok);
    if (!res.ok) throw new Error("data.json not found");
    const data = await res.json();
    console.log("data loaded:", data.records.length);
    allRecords = data.records || [];
    originalRecords = [...allRecords];
    const updateTime = data.update_time || new Date().toLocaleString();
    document.getElementById("update-time").textContent = "数据更新: " + updateTime;
    
    let fileQuotes = {};
    try {
      const quotesRes = await fetch(staticPath('trade_quotes.json'));
      if (quotesRes.ok) fileQuotes = await quotesRes.json();
    } catch(e) { console.log('trade_quotes.json fetch failed:', e); }
    const fileCount = Object.keys(fileQuotes).length;
    
    const savedQuotes = localStorage.getItem('trade_quotes_cache');
    const savedQuotesCount = savedQuotes ? Object.keys(JSON.parse(savedQuotes)).length : 0;
    
    if (fileCount > savedQuotesCount) {
      tradeQuotesCache = fileQuotes;
      localStorage.setItem('trade_quotes_cache', JSON.stringify(fileQuotes));
      const today = new Date().toISOString().slice(0, 10);
      localStorage.setItem('trade_quote_time', today);
      document.getElementById('quote-time').textContent = '价格更新: ' + today;
      console.log('Using file quotes:', fileCount);
    } else if (savedQuotes) {
      tradeQuotesCache = JSON.parse(savedQuotes);
      document.getElementById('quote-time').textContent = '价格更新: ' + (localStorage.getItem('trade_quote_time') || '');
      console.log('Using cached quotes:', savedQuotesCount);
    } else {
      tradeQuotesCache = fileQuotes;
      console.log('Using empty file quotes:', fileCount);
    }
    doFilter();
    loadReports();
  } catch (e) {
    document.getElementById("table-container").innerHTML = '<div class="loading">数据加载失败: ' + e + '<br>请确保 data.json 已生成并推送到仓库</div>';
    return;
  }
}

let reportsData = [];

async function syncReports() {
  try {
    if (!requireLocalMode('同步报告')) return;
    const res = await fetch(apiPath('api/sync-reports'), { method: 'POST' });
    const data = await res.json();
    if (data.success) {
      alert('同步成功！发现 ' + data.new_count + ' 个新报告，当前共 ' + data.total + ' 个报告');
      await refreshSharedData();
      await loadReports();
    } else {
      alert('同步失败');
    }
  } catch (e) {
    alert('同步失败: ' + e.message);
  }
}

async function loadReports() {
  try {
    const res = await fetch(staticPath('stockinfos.json'));
    reportsData = await res.json();
    const reportsFileData = await loadFromFile('reports/data.json');
    if (reportsFileData.ratings) {
      localStorage.setItem('report_ratings', JSON.stringify(reportsFileData.ratings));
    }
    if (reportsFileData.tags) {
      localStorage.setItem('report_tags', JSON.stringify(reportsFileData.tags));
    }
    initReportFilters();
    initReportSwFilters();
    renderReportsList();
  } catch (e) {
    console.error('loadReports error:', e);
  }
}

function updateReadOnlyUI() {
  if (isLocalMode) return;
  ['trade-quotes-btn', 'add-stock-btn', 'basics-quotes-btn', 'add-report-btn', 'sync-reports-btn', 'manage-tags-btn'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.display = 'none';
  });
}

function renderReportsList() {
  const savedRatings = JSON.parse(localStorage.getItem('report_ratings') || '{}');
  const savedTags = JSON.parse(localStorage.getItem('report_tags') || '{}');
  const allTags = getAllTags();
  const q = document.getElementById('report-search').value.trim().toLowerCase();
  const sw1 = document.getElementById('report-sw1-filter').value;
  const sw2 = document.getElementById('report-sw2-filter').value;
  const sw3 = document.getElementById('report-sw3-filter').value;
  const ratingFilter = document.getElementById('report-rating-filter').value;
  const tagFilter = document.getElementById('report-tag-filter').value;
  const dateFilter = document.getElementById('report-date-filter').value;
  
  const filtered = reportsData.filter(r => {
    const s = basicsData.find(x => x.name === r.name || x.report_file === r.file);
    const rating = savedRatings[r.name] ?? r.rating ?? 0;
    const tags = savedTags[r.name] || [];
    if (q && !r.name.toLowerCase().includes(q)) return false;
    if (sw1 && (!s || s.sw_lv1 !== sw1)) return false;
    if (sw2 && (!s || s.sw_lv2 !== sw2)) return false;
    if (sw3 && (!s || s.sw_lv3 !== sw3)) return false;
    if (ratingFilter && String(rating) !== ratingFilter) return false;
    if (tagFilter && !tags.includes(tagFilter)) return false;
    if (dateFilter && r.add_date !== dateFilter) return false;
    return true;
  });

  const countEl = document.getElementById('report-count');
  if (countEl) countEl.textContent = filtered.length;
  
  renderReportsTOC(filtered, savedRatings, savedTags);
  if (filtered.length === 0) {
    document.getElementById('reports-list').innerHTML = '<div style="padding:20px;color:#999;">暂无报告</div>';
    return;
  }
  document.getElementById('reports-list').innerHTML = '<div class="report-list-grid">' + 
    filtered.map(r => {
      const rating = savedRatings[r.name] ?? r.rating ?? 0;
      const tags = savedTags[r.name] || [];
      const stars = Array(5).fill(0).map((_, i) => {
        const starNum = i + 1;
        const clickAttr = isLocalMode ? 'onclick="event.stopPropagation();setRating(\'' + r.name + '\',' + starNum + ')" onmouseover="event.target.style.transform=\'scale(1.3)\'" onmouseout="event.target.style.transform=\'scale(1)\'"' : '';
        const cursor = isLocalMode ? 'pointer' : 'default';
        return '<span ' + clickAttr + ' style="cursor:' + cursor + ';color:' + (i < rating ? '#f1c40f' : '#ddd') + ';font-size:18px;margin:0 2px;transition:transform 0.2s;display:inline-block;">★</span>';
      }).join('');
      const tagHtml = tags.map(t => '<span style="background:' + getTagColor(t) + ';color:#fff;padding:2px 6px;border-radius:10px;font-size:11px;margin-right:4px;">' + t + '</span>').join('');
      return '<div class="report-card" onclick="showReport(\'' + r.file + '\')"><div style="position:absolute;top:12px;right:12px;">' + stars + '</div><h3 class="report-title">' + r.name + '</h3><div class="report-meta">' + tagHtml + '</div><p style="color:#94a3b8;font-size:12px;margin:0 0 10px;">添加日期: ' + (r.add_date || '-') + '</p><p class="report-preview">' + r.content.substring(0, 110) + '...</p></div>';
    }).join('') + 
    '</div>';
}

function renderReportsTOC(filtered, savedRatings, savedTags) {
  const toc = document.getElementById('reports-toc');
  if (!filtered.length) {
    toc.innerHTML = '<div style="padding:10px;color:#999;font-size:12px;">无结果</div>';
    return;
  }
  toc.innerHTML = filtered.map(r => {
    const rating = r.rating || savedRatings[r.name] || 0;
    const tags = savedTags[r.name] || [];
    const stars = Array(5).fill(0).map((_, i) => '<span style="color:' + (i < rating ? '#f1c40f' : '#ddd') + ';font-size:12px;">★</span>').join('');
    const tagHtml = tags.map(t => '<span style="background:' + getTagColor(t) + ';color:#fff;padding:1px 4px;border-radius:8px;font-size:10px;margin-right:2px;">' + t + '</span>').join('');

function getTagColor(tag) {
  const colors = ['#3498db', '#2ecc71', '#e74c3c', '#9b59b6', '#f39c12', '#1abc9c', '#e67e22', '#34495e', '#16a085', '#c0392b'];
  let hash = 0;
  for (let i = 0; i < tag.length; i++) {
    hash = tag.charCodeAt(i) + ((hash << 5) - hash);
  }
  return colors[Math.abs(hash) % colors.length];
}

function doFilter() {
  const q = normalizeSearchText(document.getElementById("search-input").value);
  const recipient = document.getElementById("recipient-filter").value.trim();
  const stage = document.getElementById("stage-filter").value;
  const docType = document.getElementById("doctype-filter").value;
  const dateFrom = dateRange.from;
  const dateTo = dateRange.to;

  filteredRecords = allRecords.filter(r => {
    if (stage && r.stage !== stage) return false;
    if (docType && r.doc_type !== docType) return false;
    if (dateFrom && (r._date || "") < dateFrom) return false;
    if (dateTo && (r._date || "") > dateTo) return false;
    if (recipient && !(r._recipients_full || "").includes(recipient)) return false;
    if (q) {
      const fields = [r.stock_name || "", r.stock_code || "", r.stage || "", r.doc_type || "", r._date || "", r.content || "", r._price || "", r._recipients_full || ""];
      const parsed = r._parsed || {};
      for (const v of Object.values(parsed)) {
        if (typeof v === "string") fields.push(v);
        else if (typeof v === "object") {
          for (const sv of Object.values(v)) {
            if (typeof sv === "string") fields.push(sv);
          }
        }
      }
      if (!fields.some(f => matchesSearchText(f, q))) return false;
    }
    return true;
  });

  originalRecords = [...filteredRecords];
  if (sortColumn === null) {
    renderPage();
  } else {
    applySort();
    renderPage();
  }
  currentPage = 1;
}

function extractPriceNum(price) {
  if (!price) return 0;
  const s = String(price).replace(/,/g, "").replace("元", "").replace("万", "0000").replace("亿", "00000000");
  const m = s.match(/[\d.]+/);
  return m ? parseFloat(m[0]) : 0;
}

function extractDateNum(date) {
  if (!date) return 99999999;
  return parseInt(date.replace(/-/g, "")) || 99999999;
}

function applySort() {
  filteredRecords.sort((a, b) => {
    let va, vb;
    let cmp = 0;
    switch (sortColumn) {
      case "date":
      case "stock":
      case "stage":
      case "doc_type":
        va = a[sortColumn] || a["_" + sortColumn] || "";
        vb = b[sortColumn] || b["_" + sortColumn] || "";
        if (sortColumn === "date") {
          cmp = (va || "").localeCompare(vb || "");
        } else {
          cmp = (va || "").localeCompare(vb || "");
        }
        break;
      case "price":
        va = extractPriceNum(a._price);
        vb = extractPriceNum(b._price);
        cmp = va - vb;
        break;
      case "unlock":
        va = extractDateNum(a._unlock_date);
        vb = extractDateNum(b._unlock_date);
        cmp = va - vb;
        break;
      default:
        va = a._date || "";
        vb = b._date || "";
        cmp = (va || "").localeCompare(vb || "");
    }
    return sortAsc ? cmp : -cmp;
  });
}

function sortBy(col) {
  if (sortColumn === col) {
    if (!sortAsc) {
      sortAsc = true;
    } else {
      sortColumn = null;
      sortAsc = false;
      filteredRecords = [...originalRecords];
      document.querySelectorAll("th").forEach(th => th.classList.remove("sorted"));
      renderPage();
      return;
    }
  } else {
    sortColumn = col;
    sortAsc = false;
  }
  document.querySelectorAll("th").forEach(th => th.classList.remove("sorted"));
  document.querySelector('th[onclick="sortBy(\'' + col + '\')"]').classList.add("sorted");
  applySort();
  renderPage();
}

function applyDateRange() {
  const v = document.getElementById("date-range").value;
  const today = new Date();
  const format = d => d.toISOString().slice(0, 10);
  
  if (v === "") {
    dateRange = { from: "", to: "" };
  } else if (v === "7") {
    const d = new Date(today); d.setDate(d.getDate() - 7);
    dateRange = { from: format(d), to: format(today) };
  } else if (v === "30") {
    const d = new Date(today); d.setDate(d.getDate() - 30);
    dateRange = { from: format(d), to: format(today) };
  } else if (v === "90") {
    const d = new Date(today); d.setDate(d.getDate() - 90);
    dateRange = { from: format(d), to: format(today) };
  } else if (v.match(/^\d{4}$/)) {
    dateRange = { from: v + "-01-01", to: v + "-12-31" };
  } else if (v.match(/^\d{4}-\d{2}$/)) {
    const d = new Date(v + "-01");
    const last = new Date(d.getFullYear(), d.getMonth() + 1, 0);
    dateRange = { from: v + "-01", to: format(last) };
  } else {
    dateRange = { from: "", to: "" };
  }
  doFilter();
}

function renderPage() {
  const container = document.getElementById("table-container");
  const total = filteredRecords.length;
  const totalPages = Math.ceil(total / pageSize) || 1;
  const start = (currentPage - 1) * pageSize;
  const pageRecords = filteredRecords.slice(start, start + pageSize);

  document.getElementById("stats").textContent = "共 " + total + " 条记录（已过滤预告期、同股票同价格保留最新阶段），当前第 " + currentPage + " / " + totalPages + " 页";

  if (!pageRecords.length) {
    container.innerHTML = '<div class="loading">无数据</div>';
    document.getElementById("pagination").innerHTML = "";
    return;
  }

  container.innerHTML = '<tbody>' + pageRecords.map((r, i) => {
    const idx = start + i;
    const isError = !!r.error;
    const isSkipped = !!r.skipped;
    const rowClass = isError ? "error-row" : isSkipped ? "skipped-row" : "";
    const stockLabel = r.stock_name && r.stock_name !== "未知" ? r.stock_name : (r._parsed && (r._parsed.股票名称 || r._parsed.股票简称) ? (r._parsed.股票名称 || r._parsed.股票简称) : "");
    const codeLabel = r.stock_code || (r._parsed && r._parsed.股票代码 ? r._parsed.股票代码 : "");
    const stockCell = stockLabel && codeLabel ? '<span class="cell-stock" onclick="showReportByName(\'' + esc(stockLabel) + '\')" style="cursor:pointer;color:#3498db;">' + esc(stockLabel) + '</span> <span class="cell-code">(' + esc(codeLabel) + ')</span>' : '<span class="cell-stock" onclick="showReportByName(\'' + esc(stockLabel || codeLabel || "未知") + '\')" style="cursor:pointer;color:#3498db;">' + esc(stockLabel || codeLabel || "未知") + '</span>';
    const price = r._price || (r._parsed && r._parsed.每股价格 ? r._parsed.每股价格 : "");
    const curPrice = tradeQuotesCache[codeLabel];
    const hasPriceNum = price && /\d/.test(price);
    let priceHtml = hasPriceNum ? esc(price) : '-';
    if (hasPriceNum && curPrice) {
      const priceNum = parseFloat(String(price).replace(/[^\d.]/g, '')) || 0;
      const change = priceNum > 0 ? ((curPrice.price - priceNum) / priceNum * 100) : 0;
      const changeColor = change >= 0 ? '#e74c3c' : '#27ae60';
      const changeSign = change >= 0 ? '+' : '';
      priceHtml += '<br><span style="color:#666;font-size:11px;">现价:' + curPrice.price.toFixed(2) + '</span>' +
        '<br><span style="font-size:11px;color:' + changeColor + ';">' + changeSign + change.toFixed(2) + '%</span>';
    }
    const totalAmount = r._parsed && r._parsed.总金额 ? r._parsed.总金额 : "";
    const unlock = r._unlock_date || (r._parsed && r._parsed.解禁日期 ? r._parsed.解禁日期 : "");
    const shortRecip = r._recipients_short || "";
    const fullRecip = r._recipients_full || "";
    const showRecip = shortRecip || (r._parsed && r._parsed.受让方信息 ? r._parsed.受让方信息 : "");
    const content = r.content || r.error || "";
    const shortContent = content.length > 5 ? content.slice(0, 5) + "..." : content;

    return '<tr class="' + rowClass + '">' +
      '<td class="cell-date">' + esc(r._date || "") + '</td>' +
      '<td>' + stockCell + '</td>' +
      '<td><span class="tag tag-stage-' + esc(r.stage || "未知阶段") + '">' + esc(r.stage || "未知") + '</span></td>' +
      '<td><span class="tag tag-doc-' + esc(r.doc_type || "公告") + '">' + esc(r.doc_type || "公告") + '</span></td>' +
      '<td class="cell-price">' + priceHtml + '</td>' +
      '<td>' + esc(totalAmount) + '</td>' +
      '<td>' + esc(unlock) + '</td>' +
      '<td title="' + esc(fullRecip) + '">' + esc(shortRecip || showRecip) + '</td>' +
      '<td title="' + esc(content) + '">' + esc(shortContent) + '</td>' +
      '</tr>';
  }).join("") + '</tbody>';

  document.getElementById("prev-btn").disabled = currentPage <= 1;
  document.getElementById("next-btn").disabled = currentPage >= totalPages;
  document.getElementById("page-info").textContent = currentPage + " / " + totalPages;
}

function normalizeCode(code) {
  return String(code || '').replace(/\D/g, '').padStart(6, '0');
}

function buildStockMetaIndex(stocks) {
  const byCode = {};
  const byName = {};
  Object.values(stocks || {}).forEach(s => {
    if (!s) return;
    const code = normalizeCode(s.code || s.full_code || '');
    const name = String(s.name || '').trim();
    const meta = {
      code: code || '',
      full_code: s.full_code || (code ? code + (s.market === 'SZ' ? '.SZ' : s.market === 'SH' ? '.SH' : '') : ''),
      market: s.market || '',
      sw_lv1: s.sw_lv1 || '',
      sw_lv2: s.sw_lv2 || '',
      sw_lv3: s.sw_lv3 || '',
      sw_industry: s.sw_industry || '',
      sw_lv1_code: s.sw_lv1_code || '',
      sw_lv2_code: s.sw_lv2_code || '',
      sw_lv3_code: s.sw_lv3_code || ''
    };
    if (code) byCode[code] = meta;
    if (name) byName[name] = meta;
  });
  stockMetaIndex = { byCode, byName };
}

function buildReportMetaIndex() {
  const byName = {};
  (reportsData || []).forEach(r => {
    if (!r || !r.name) return;
    byName[r.name] = r;
  });
  return byName;
}

function syncReportMetaToBasics() {
  const reportIndex = buildReportMetaIndex();
  let changed = false;
  basicsData = basicsData.map(s => {
    const report = reportIndex[s.name] || (s.report_file ? (reportsData || []).find(r => r.file === s.report_file) : null);
    if (!report) return s;
    const next = { ...s };
    if (!next.report_file) next.report_file = report.file || '';
    if (!next.report_preview) next.report_preview = report.content ? report.content.slice(0, 350).trim() : next.report_preview;
    const extractedIndustry = extractIndustry(report.content || '');
    const extractedBusiness = extractBusiness(report.content || '');
    if (!next.industry || next.industry === '-') next.industry = extractedIndustry;
    if (!next.business || next.business === '-') next.business = extractedBusiness;
    if (next.report_file || next.industry !== s.industry || next.business !== s.business || next.report_preview !== s.report_preview) changed = true;
    return next;
  });
  return changed;
}

function enrichStockRecord(s) {
  const code = normalizeCode(s.code || s.full_code || '');
  const name = String(s.name || '').trim();
  const meta = (code && stockMetaIndex.byCode[code]) || (name && stockMetaIndex.byName[name]) || null;
  if (!meta) return s;

  if (!s.code) s.code = meta.code || code;
  if (!s.full_code) s.full_code = meta.full_code || (s.code ? s.code + '.SH' : '');
  if (!s.market) s.market = meta.market || '';
  if (!s.sw_lv1 || s.sw_lv1 === '-') s.sw_lv1 = meta.sw_lv1 || s.sw_lv1 || '-';
  if (!s.sw_lv2 || s.sw_lv2 === '-') s.sw_lv2 = meta.sw_lv2 || s.sw_lv2 || '-';
  if (!s.sw_lv3 || s.sw_lv3 === '-') s.sw_lv3 = meta.sw_lv3 || s.sw_lv3 || '-';
  if (!s.sw_industry || s.sw_industry === '-') s.sw_industry = meta.sw_industry || s.sw_industry || (s.sw_lv3 || s.sw_lv2 || s.sw_lv1 || '-');
  return s;
}

async function persistStockDb() {
  if (!isLocalMode) return;
  const stocks = {};
  basicsData.map(enrichStockRecord).forEach(s => {
    const code = s.full_code || (s.code ? s.code + '.SH' : '');
    if (!code) return;
    stocks[code] = {
      name: s.name || '',
      code: s.code || '',
      market: s.market || '',
      full_code: code,
      industry: s.industry || '',
      business: s.business || '',
      price: s.price || '',
      change_percent: s.change_percent || '',
      market_cap: s.market_cap || '',
      profit: s.profit || '',
      gross_margin: s.gross_margin || '',
      net_margin: s.net_margin || '',
      deduct_net_margin: s.deduct_net_margin || '',
      pe: s.pe || '',
      rating: s.rating || 0,
      tags: s.tags || [],
      report_file: s.report_file || '',
      add_date: s.add_date || '',
      transfer_count: s.transfer_count || 0,
      transfer_stages: s.transfer_stages || [],
      last_transfer_date: s.last_transfer_date || '',
      sw_industry: s.sw_industry || '',
      sw_lv1: s.sw_lv1 || '',
      sw_lv2: s.sw_lv2 || '',
      sw_lv3: s.sw_lv3 || '',
      sw_lv1_code: s.sw_lv1_code || '',
      sw_lv2_code: s.sw_lv2_code || '',
      sw_lv3_code: s.sw_lv3_code || ''
    };
  });

  const payload = {
    update_time: new Date().toISOString().slice(0, 10),
    stats: {
      total_stocks: Object.keys(stocks).length,
      stocks_with_quotes: basicsData.filter(s => s.price).length,
      stocks_with_transfers: basicsData.filter(s => s.transfer_count > 0).length,
      stocks_with_ratings: basicsData.filter(s => (s.rating || 0) > 0).length
    },
    sources: {
      reports: 'stockinfos.json',
      quotes: 'trade_quotes.json',
      transfers: 'data.json',
      ratings: 'user_data/reports/data.json'
    },
    stocks
  };

  try {
    await fetch(apiPath('api/save-stocks-db'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } catch (e) {
    console.error('persistStockDb failed:', e);
  }
}

function searchDetailStocks() {
  const q = normalizeSearchText(document.getElementById('detail-search-input').value);
  const sw2 = (document.getElementById('detail-sw2-filter') || {}).value || '';
  const sw3 = (document.getElementById('detail-sw3-filter') || {}).value || '';
  const hasReport = !!(document.getElementById('detail-has-report') || {}).checked;
  if (!allStocksData.length) return;
  detailFilteredStocks = allStocksData.filter(s => {
    if (detailIndustryFilter && s.sw_lv1 !== detailIndustryFilter) return false;
    if (sw2 && s.sw_lv2 !== sw2) return false;
    if (sw3 && s.sw_lv3 !== sw3) return false;
    if (hasReport && !s.report_file) return false;
    if (q) {
      return matchesSearchText(s.code || '', q) || matchesSearchText(s.name || '', q) ||
             matchesSearchText(s.sw_lv1 || '', q) ||
             matchesSearchText(s.sw_lv2 || '', q) ||
             matchesSearchText(s.sw_lv3 || '', q);
    }
    return true;
  });
  detailPage = 1;
  renderDetailLv1Sidebar();
  renderDetailTable();
  updateDetailTotalInfo();
}

function renderDetailLv1Sidebar() {
  const sidebar = document.getElementById('detail-lv1-sidebar');
  if (!sidebar || !allStocksData.length) return;
  const counts = {};
  allStocksData.forEach(s => {
    const lv1 = (s.sw_lv1 && s.sw_lv1 !== '-') ? s.sw_lv1 : '其他';
    counts[lv1] = (counts[lv1] || 0) + 1;
  });
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const total = allStocksData.length;
  const activeLv1 = detailIndustryFilter;
  const activeLv2 = (document.getElementById('detail-sw2-filter') || {}).value || '';
  const activeLv3 = (document.getElementById('detail-sw3-filter') || {}).value || '';
  const lv2Map = {};
  const lv3Map = {};
  allStocksData.forEach(s => {
    const lv1 = (s.sw_lv1 && s.sw_lv1 !== '-') ? s.sw_lv1 : '其他';
    const lv2 = (s.sw_lv2 && s.sw_lv2 !== '-') ? s.sw_lv2 : '';
    const lv3 = (s.sw_lv3 && s.sw_lv3 !== '-') ? s.sw_lv3 : '';
    if (lv2) {
      if (!lv2Map[lv1]) lv2Map[lv1] = [];
      if (!lv2Map[lv1].includes(lv2)) lv2Map[lv1].push(lv2);
    }
    if (lv3) {
      const key = lv1 + '||' + lv2;
      if (!lv3Map[key]) lv3Map[key] = [];
      if (!lv3Map[key].includes(lv3)) lv3Map[key].push(lv3);
    }
  });
  Object.keys(lv2Map).forEach(k => lv2Map[k].sort());
  Object.keys(lv3Map).forEach(k => lv3Map[k].sort());
  const btnStyle = (active) =>
    'width:100%;text-align:left;padding:7px 12px 7px 14px;border:none;border-left:3px solid ' +
    (active ? '#2563eb' : 'transparent') + ';background:' + (active ? '#eff6ff' : 'transparent') +
    ';color:' + (active ? '#2563eb' : '#475569') + ';font-size:12px;cursor:pointer;' +
    'display:flex;justify-content:space-between;align-items:center;gap:4px;font-weight:' + (active ? '600' : '400') + ';';
  const itemStyle = 'padding:4px 6px;border-radius:6px;font-size:12px;cursor:pointer;display:flex;justify-content:space-between;gap:6px;align-items:center;';
  const activeItemStyle = 'background:#eff6ff;color:#2563eb;font-weight:600;';
  const inactiveItemStyle = 'background:transparent;color:#475569;';
  const renderLeafList = (items, selected, onClick) => {
    if (!items || !items.length) return '<div class="muted" style="font-size:12px;padding:6px 0;">请选择上一级</div>';
    return items.map(name => {
      const active = selected === name;
      return '<div onclick="' + onClick(name) + '" style="' + itemStyle + (active ? activeItemStyle : inactiveItemStyle) + '">' +
        '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(name) + '</span>' +
        '<span style="color:#94a3b8;font-size:11px;flex-shrink:0;">' + (active ? '●' : '') + '</span>' +
      '</div>';
    }).join('');
  };
  const renderLv3List = (lv1, lv2) => {
    if (!lv1 || !lv2) return '<div class="muted" style="font-size:12px;padding:6px 0;">请选择二级行业</div>';
    const key = lv1 + '||' + lv2;
    return renderLeafList(lv3Map[key] || [], activeLv3, (name) => "setDetailIndustryPath('" + lv1.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + "','" + lv2.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + "','" + name.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + "')");
  };
  sidebar.innerHTML =
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;align-items:start;height:100%;">' +
      '<div style="border-right:1px solid #eef2f7;padding-right:6px;max-height:calc(100vh - 110px);overflow-y:auto;">' +
        '<div style="padding:6px 6px 8px;font-size:12px;color:#64748b;font-weight:600;">申万一级</div>' +
        '<button onclick="setDetailIndustryFilter(\'\')" style="' + btnStyle(!activeLv1) + '">' +
        '<span>全部</span><span style="color:#94a3b8;font-size:11px;">' + total + '</span></button>' +
        sorted.map(([name, cnt]) => {
          const active = activeLv1 === name;
          return '<button onclick="setDetailIndustryFilter(\'' + name.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\')" style="' + btnStyle(active) + '">' +
            '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:86px;">' + esc(name) + '</span>' +
            '<span style="color:#94a3b8;font-size:11px;flex-shrink:0;">' + cnt + '</span></button>';
        }).join('') +
      '</div>' +
      '<div style="border-right:1px solid #eef2f7;padding-right:6px;max-height:calc(100vh - 110px);overflow-y:auto;">' +
        '<div style="padding:6px 6px 8px;font-size:12px;color:#64748b;font-weight:600;">申万二级</div>' +
        renderLeafList(lv2Map[activeLv1] || [], activeLv2, (name) => "setDetailIndustryPath('" + activeLv1.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + "','" + name.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + "')") +
      '</div>' +
      '<div style="max-height:calc(100vh - 110px);overflow-y:auto;">' +
        '<div style="padding:6px 6px 8px;font-size:12px;color:#64748b;font-weight:600;">申万三级</div>' +
        renderLv3List(activeLv1, activeLv2) +
      '</div>' +
    '</div>';
}

function renderDetailTable() {
  const start = (detailPage - 1) * detailPageSize;
  const pageItems = detailFilteredStocks.slice(start, start + detailPageSize);
  const totalPages = Math.ceil(detailFilteredStocks.length / detailPageSize) || 1;
  const tbody = document.getElementById('detail-table-body');
  if (!tbody) return;
  tbody.innerHTML = pageItems.map((s, i) => {
    const bg = i % 2 === 0 ? '#fff' : '#fafbfc';
    const hasRep = !!s.report_file;
    const rating = s.rating || 0;
    const stars = rating > 0
      ? '<span style="color:#f59e0b;">' + '★'.repeat(rating) + '</span><span style="color:#e2e8f0;">' + '☆'.repeat(5 - rating) + '</span>'
      : '<span style="color:#e2e8f0;">☆☆☆☆☆</span>';
    return '<tr onclick="showDetailByCode2(\'' + esc(s.code) + '\')" ' +
      'style="background:' + bg + ';cursor:pointer;border-bottom:1px solid #f1f5f9;" ' +
      'onmouseover="this.style.background=\'#eff6ff\'" onmouseout="this.style.background=\'' + bg + '\'">' +
      '<td style="padding:9px 14px;font-family:monospace;font-size:12px;color:#64748b;white-space:nowrap;">' + esc(s.code) + '</td>' +
      '<td style="padding:9px 14px;font-weight:500;color:#0f172a;white-space:nowrap;">' + esc(s.name) + '</td>' +
      '<td style="padding:9px 14px;color:#475569;font-size:12px;">' + esc(s.sw_lv1 && s.sw_lv1 !== '-' ? s.sw_lv1 : '') + '</td>' +
      '<td style="padding:9px 14px;color:#475569;font-size:12px;">' + esc(s.sw_lv2 && s.sw_lv2 !== '-' ? s.sw_lv2 : '') + '</td>' +
      '<td style="padding:9px 14px;color:#475569;font-size:12px;">' + esc(s.sw_lv3 && s.sw_lv3 !== '-' ? s.sw_lv3 : '') + '</td>' +
      '<td style="padding:9px 14px;text-align:center;">' +
        (hasRep ? '<span style="color:#16a34a;font-size:15px;" title="有报告">●</span>' : '<span style="color:#e2e8f0;font-size:15px;">○</span>') +
      '</td>' +
      '<td style="padding:9px 14px;text-align:center;font-size:12px;white-space:nowrap;">' + stars + '</td>' +
      '</tr>';
  }).join('');
  // Pagination
  const pag = document.getElementById('detail-pagination');
  if (!pag) return;
  const pageSizeSel = '<span style="margin-left:auto;display:flex;align-items:center;gap:4px;font-size:12px;color:#64748b;">每页' +
    '<select onchange="onDetailPageSizeChange(this.value)" style="padding:2px 6px;border:1px solid #d9e2ec;border-radius:5px;font-size:12px;margin:0 2px;">' +
    [20,50,100,200].map(n => '<option value="' + n + '"' + (n === detailPageSize ? ' selected' : '') + '>' + n + '</option>').join('') +
    '</select>条</span>';
  if (totalPages <= 1) {
    pag.innerHTML = '<span>' + detailFilteredStocks.length + ' 只股票</span>' + pageSizeSel;
    return;
  }
  const maxShow = 5, half = 2;
  let startP = Math.max(1, detailPage - half);
  let endP = Math.min(totalPages, startP + maxShow - 1);
  if (endP - startP + 1 < maxShow) startP = Math.max(1, endP - maxShow + 1);
  const btn = (n, label, disabled, active) =>
    '<button onclick="detailGoPage(' + n + ')" ' + (disabled ? 'disabled' : '') +
    ' style="padding:5px 9px;border:1px solid ' + (active ? '#2563eb' : '#d9e2ec') +
    ';border-radius:6px;background:' + (active ? '#2563eb' : '#fff') +
    ';color:' + (active ? '#fff' : (disabled ? '#cbd5e1' : '#475569')) +
    ';cursor:' + (disabled ? 'default' : 'pointer') + ';font-weight:' + (active ? '600' : '400') + ';">' + label + '</button>';
  let pagHtml = btn(1, '«', detailPage <= 1, false) + btn(detailPage - 1, '‹', detailPage <= 1, false);
  if (startP > 1) pagHtml += '<span style="color:#94a3b8;padding:0 2px;">…</span>';
  for (let p = startP; p <= endP; p++) pagHtml += btn(p, p, false, p === detailPage);
  if (endP < totalPages) pagHtml += '<span style="color:#94a3b8;padding:0 2px;">…</span>';
  pagHtml += btn(detailPage + 1, '›', detailPage >= totalPages, false) + btn(totalPages, '»', detailPage >= totalPages, false);
  pagHtml += '<span style="margin-left:8px;">第 ' + detailPage + ' / ' + totalPages + ' 页 · 共 ' + detailFilteredStocks.length + ' 只</span>';
  pagHtml += '<span style="margin-left:auto;display:flex;align-items:center;gap:4px;font-size:12px;color:#64748b;">每页' +
    '<select onchange="onDetailPageSizeChange(this.value)" style="padding:2px 6px;border:1px solid #d9e2ec;border-radius:5px;font-size:12px;margin:0 2px;">' +
    [20,50,100,200].map(n => '<option value="' + n + '"' + (n === detailPageSize ? ' selected' : '') + '>' + n + '</option>').join('') +
    '</select>条</span>';
  pag.innerHTML = pagHtml;
}

function onDetailPageSizeChange(val) {
  detailPageSize = parseInt(val, 10) || 20;
  detailPage = 1;
  renderDetailTable();
}

function detailGoPage(n) {
  const totalPages = Math.ceil(detailFilteredStocks.length / detailPageSize) || 1;
  detailPage = Math.max(1, Math.min(n, totalPages));
  renderDetailTable();
  window.scrollTo(0, 0);
}

function setDetailIndustryFilter(name) {
  detailIndustryFilter = name;
  updateDetailSw2Options();
  const sw2 = document.getElementById('detail-sw2-filter');
  const sw3 = document.getElementById('detail-sw3-filter');
  if (sw2) sw2.value = '';
  if (sw3) {
    sw3.value = '';
    sw3.innerHTML = '<option value="">申万三级</option>';
  }
  searchDetailStocks();
}

function setDetailIndustryPath(lv1, lv2, lv3) {
  detailIndustryFilter = lv1 || '';
  updateDetailSw2Options();
  const sw2 = document.getElementById('detail-sw2-filter');
  const sw3 = document.getElementById('detail-sw3-filter');
  if (sw2) sw2.value = lv2 || '';
  onDetailSw2Change();
  if (sw3) sw3.value = lv3 || '';
  searchDetailStocks();
}

function onDetailSw2Change() {
  const sw2 = (document.getElementById('detail-sw2-filter') || {}).value || '';
  const lv1 = detailIndustryFilter;
  const opts = new Set();
  allStocksData.forEach(s => {
    if ((!lv1 || s.sw_lv1 === lv1) && (!sw2 || s.sw_lv2 === sw2) && s.sw_lv3 && s.sw_lv3 !== '-')
      opts.add(s.sw_lv3);
  });
  document.getElementById('detail-sw3-filter').innerHTML = '<option value="">申万三级</option>' +
    [...opts].sort().map(v => '<option value="' + esc(v) + '">' + esc(v) + '</option>').join('');
}

function updateDetailSw2Options() {
  const lv1 = detailIndustryFilter;
  const opts = new Set();
  allStocksData.forEach(s => {
    if ((!lv1 || s.sw_lv1 === lv1) && s.sw_lv2 && s.sw_lv2 !== '-') opts.add(s.sw_lv2);
  });
  const sw2 = document.getElementById('detail-sw2-filter');
  const sw3 = document.getElementById('detail-sw3-filter');
  if (sw2) sw2.innerHTML = '<option value="">申万二级</option>' +
    [...opts].sort().map(v => '<option value="' + esc(v) + '">' + esc(v) + '</option>').join('');
  if (sw3) sw3.innerHTML = '<option value="">申万三级</option>';
}

function updateDetailTotalInfo() {
  const el = document.getElementById('detail-total-info');
  if (!el || !allStocksData.length) return;
  const total = allStocksData.length;
  const filtered = detailFilteredStocks.length;
  const lv1Count = new Set(allStocksData.map(s => s.sw_lv1).filter(v => v && v !== '-')).size;
  el.textContent = filtered < total
    ? '筛选 ' + filtered + ' / ' + total + ' 只 · ' + lv1Count + ' 个申万一级'
    : '共 ' + total + ' 只 · 覆盖 ' + lv1Count + ' 个申万一级';
}

function clearDetailSearch() {
  document.getElementById('detail-search-input').value = '';
  const cb = document.getElementById('detail-has-report');
  if (cb) cb.checked = false;
  detailIndustryFilter = '';
  updateDetailSw2Options();
  searchDetailStocks();
}

async function loadAllStocks() {
  const infoEl = document.getElementById('detail-total-info');
  if (infoEl) infoEl.textContent = '加载中…';
  try {
    const res = await fetch(staticPath('stocks_db.json'));
    if (!res.ok) throw new Error('stocks_db.json 未找到');
    const db = await res.json();
    allStocksData = Object.values(db.stocks || {}).map(s => ({
      code: s.code || '',

function mergeReportsIntoBasics() {
  if (!reportsData || !reportsData.length) return;
  const existingCodes = new Set(basicsData.map(s => s.code));
  let changed = false;
  for (const r of reportsData) {
    const code = extractCodeFromReport(r.content);
    if (code && !existingCodes.has(code)) {
      basicsData.push(enrichStockRecord({
        code: code,
        name: r.name,
        sw_lv1: '-',
        sw_lv2: '-',
        sw_lv3: '-',
        sw_industry: '-',
        industry: extractIndustry(r.content),
        business: extractBusiness(r.content),
        advantage: extractAdvantage(r.content),
        competitor: extractCompetitor(r.content),
        market_cap: extractMarketCap(r.content),
        profit: extractProfit(r.content),
        gross_margin: extractGrossMargin(r.content),
        net_margin: extractNetMargin(r.content),
        deduct_net_margin: '-',
        pe: '-'
      }));
      existingCodes.add(code);
      changed = true;
    }
  }
  if (changed) {
    localStorage.setItem('stock_basics', JSON.stringify(basicsData));
    syncReportMetaToBasics();
    if (isLocalMode) persistStockDb();
  }
}

function extractCodeFromReport(content) {
  const m = content.match(/(\d{6})\.[A-Z]{2}/);
  return m ? m[1] : '';
}

function extractIndustry(content) {
  const m = content.match(/一句话行业定位[：:]\s*[^：:【】\n]+/);
  return m ? m[0].replace(/一句话行业定位[：:]\s*/, '').trim() : '-';
}

function extractBusiness(content) {
  const m = content.match(/主营业务描述[：:][^\n]+[^\n]{10,100}/);
  return m ? m[0].replace(/主营业务描述[：:]/, '').trim() : '-';
}

function extractAdvantage(content) {
  const m = content.match(/市场地位[（(][^）)]+[）)][^\n]+/);
  return m ? m[0].replace(/市场地位[（(][^）)]+[）)][：:]/, '').trim() : '-';
}

function extractCompetitor(content) {
  const m = content.match(/核心竞对[^=\n]+/);
  return m ? m[0].replace(/核心竞对/, '').replace(/[：:]/g, '').trim().substring(0, 50) : '-';
}

function extractMarketCap(content) {
  const m = content.match(/当前市值[（(][^）)]+[）)][^|\n]+/);
  if (m) {
    const val = m[0].match(/[\d.]+/);
    return val ? val[0] + '亿' : '-';
  }
  return '-';
}

function extractProfit(content) {
  const m = content.match(/净利润[^亿元\n]+[\d.]+\s*亿/);
  return m ? m[0].replace(/净利润/, '').trim() : '-';
}

function extractGrossMargin(content) {
  const m = content.match(/毛利率[：:][^%\n]+(\d+\.?\d*%)/);
  return m ? m[1] : '-';
}

function extractNetMargin(content) {
  const m = content.match(/净利率[：:][^%\n]+(\d+\.?\d*%)/);
  return m ? m[1] : '-';
}

async function syncSwFromDb() {
  if (!isLocalMode) {
    alert('非本地模式下无法运行同步脚本。');
    return;
  }
  const btn = document.querySelector('#basics-header .basic-btn-accent');
  const origText = btn ? btn.textContent : '';
  if (btn) { btn.textContent = '同步中...'; btn.disabled = true; }
  try {
    const res = await fetch(apiPath('api/sync-sw-industry'), { method: 'POST' });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || '同步失败');
    allStocksData = [];   // 清除缓存，下次访问信息查询页自动重载
    basicsData = [];
    localStorage.removeItem('stock_basics');
    await refreshSharedData();
    alert('同步完成！\n' + (data.output || '').trim());
  } catch (e) {
    alert('同步失败: ' + e.message);
  } finally {
    if (btn) { btn.textContent = origText; btn.disabled = false; }
  }
}

  const lv3 = Array.from(new Set(basicsData.map(s => s.sw_lv3).filter(v => v && v !== '-'))).sort();
  const sw1 = document.getElementById('sw1-filter');
  const sw2 = document.getElementById('sw2-filter');
  const sw3 = document.getElementById('sw3-filter');
  if (sw1) sw1.innerHTML = makeOptions('申万一级', lv1);
  if (sw2) sw2.innerHTML = makeOptions('申万二级', lv2);

function initAnalysisSwFilters() {
  const src = allStocksData.length ? allStocksData : basicsData;
  if (!src || !src.length) return;
  const lv1 = Array.from(new Set(src.map(s => s.sw_lv1).filter(v => v && v !== '-'))).sort();
  const a1 = document.getElementById('analysis-sw1-filter');
  if (!a1) return;
  const cur1 = a1.value;
  a1.innerHTML = ['<option value="">申万一级</option>'].concat(lv1.map(v => '<option value="' + esc(v) + '">' + esc(v) + '</option>')).join('');
  if (cur1 && lv1.includes(cur1)) a1.value = cur1;
  // cascade lv2 based on current lv1 selection
  const a2 = document.getElementById('analysis-sw2-filter');
  const a3 = document.getElementById('analysis-sw3-filter');
  if (a2) {
    const cur2 = a2.value;
    const lv2 = Array.from(new Set(src.filter(s => !a1.value || s.sw_lv1 === a1.value).map(s => s.sw_lv2).filter(v => v && v !== '-'))).sort();
    a2.innerHTML = buildSwOptions(lv2, '申万二级');
    if (cur2 && lv2.includes(cur2)) a2.value = cur2;
  }
  if (a3) {
    const cur3 = a3.value;
    const lv3 = Array.from(new Set(src.filter(s => (!a1.value || s.sw_lv1 === a1.value) && (!a2 || !a2.value || s.sw_lv2 === a2.value)).map(s => s.sw_lv3).filter(v => v && v !== '-'))).sort();
    a3.innerHTML = buildSwOptions(lv3, '申万三级');
    if (cur3 && lv3.includes(cur3)) a3.value = cur3;
  }
}

    '</div>' +
    '<div class="stat-list">' +
      topLv1.map(([k, v]) => '<span class="mini-pill"><strong>' + esc(k) + '</strong>' + v + '只</span>').join('') +
      topLv2.map(([k, v]) => '<span class="mini-pill"><strong>' + esc(k) + '</strong>' + v + '只</span>').join('') +
      topLv3.map(([k, v]) => '<span class="mini-pill"><strong>' + esc(k) + '</strong>' + v + '只</span>').join('') +
    '</div>' +
    '<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-top:14px;">' +
      '<div class="stat-card"><div class="stat-label">申万一级分布</div>' + renderBars(topLv1) + '</div>' +
      '<div class="stat-card"><div class="stat-label">申万二级分布</div>' + renderBars(topLv2) + '</div>' +
      '<div class="stat-card"><div class="stat-label">申万三级分布</div>' + renderBars(topLv3) + '</div>' +
    '</div>';
}

function renderIndustryAnalysis() {
  const panel = document.getElementById('sw-stats-panel');
  const summary = document.getElementById('industry-analysis-summary');
  const rankList = document.getElementById('industry-rank-list');
  const preview = document.getElementById('industry-stock-preview');
  if (!panel || !summary) return;

  const src = basicsData;
  if (!src || !src.length) {
    panel.innerHTML = '<div class="muted">暂无数据，请先加载基本面数据。</div>';
    return;
  }

  const searchQuery = normalizeSearchText(document.getElementById('analysis-search-input').value);
  const sw1 = document.getElementById('analysis-sw1-filter').value;
  const sw2 = document.getElementById('analysis-sw2-filter').value;
  const sw3 = document.getElementById('analysis-sw3-filter').value;
  const selectedIndustry = sw3 || sw2 || sw1 || '';
  const clickedIndustry = window.__analysisSelectedIndustry || '';

  // 全量统计（不受当前筛选影响，用于排行榜进度条）
  const allLv1Map = new Map();
  src.forEach(s => {
    if (s.sw_lv1 && s.sw_lv1 !== '-') allLv1Map.set(s.sw_lv1, (allLv1Map.get(s.sw_lv1) || 0) + 1);
  });

  // 当前筛选结果
  const filtered = src.filter(s =>
    (!sw1 || s.sw_lv1 === sw1) &&
    (!sw2 || s.sw_lv2 === sw2) &&
    (!sw3 || s.sw_lv3 === sw3)
  );
  const scoped = (sw1 || sw2 || sw3) ? filtered : src;
  const industryEntries = [];
  const seenIndustryEntries = new Set();
  src.forEach(s => {
    const path = [s.sw_lv1, s.sw_lv2, s.sw_lv3].filter(v => v && v !== '-');
    const industry = path[path.length - 1] || '';
    if (!industry || !matchesSearchText(industry, searchQuery)) return;
    const key = path.join(' > ');
    if (seenIndustryEntries.has(key)) return;
    seenIndustryEntries.add(key);
    industryEntries.push({ sw1: s.sw_lv1 || '', sw2: s.sw_lv2 || '', sw3: s.sw_lv3 || '', name: industry });
  });
  const matchedIndustries = searchQuery ? industryEntries : [];

  const lv1Map = new Map(), lv2Map = new Map(), lv3Map = new Map();
  scoped.forEach(s => {
    if (s.sw_lv1 && s.sw_lv1 !== '-') lv1Map.set(s.sw_lv1, (lv1Map.get(s.sw_lv1) || 0) + 1);
    if (s.sw_lv2 && s.sw_lv2 !== '-') lv2Map.set(s.sw_lv2, (lv2Map.get(s.sw_lv2) || 0) + 1);
    if (s.sw_lv3 && s.sw_lv3 !== '-') lv3Map.set(s.sw_lv3, (lv3Map.get(s.sw_lv3) || 0) + 1);
  });

  // 统计概览（紧凑 stat cards）
  panel.innerHTML =
    '<div class="stats-grid">' +
      '<div class="stat-card"><div class="stat-label">研究覆盖</div><div class="stat-value">' + src.length + '</div><div class="stat-sub">已研究股票总数</div></div>' +
      '<div class="stat-card"><div class="stat-label">当前筛选</div><div class="stat-value">' + scoped.length + '</div><div class="stat-sub">' + (sw1 || sw2 || sw3 ? [sw1,sw2,sw3].filter(Boolean).join(' › ') : '全部行业') + '</div></div>' +
      '<div class="stat-card"><div class="stat-label">涉及一级</div><div class="stat-value">' + lv1Map.size + '</div><div class="stat-sub">/ ' + allLv1Map.size + ' 个大类</div></div>' +
      '<div class="stat-card"><div class="stat-label">涉及二/三级</div><div class="stat-value">' + lv2Map.size + '</div><div class="stat-sub">二级 · ' + lv3Map.size + ' 个三级</div></div>' +
    '</div>';

  // 摘要标签
  summary.innerHTML = selectedIndustry
    ? '<span class="basic-chip" style="background:#dbeafe;color:#1e40af;">' + esc(selectedIndustry) + '</span>'
    : (searchQuery
      ? '<span class="basic-chip" style="background:#f8fafc;color:#64748b;">' + esc(searchQuery) + '</span>'
      : '<span class="muted">全部行业</span>');

  // 排行榜（全量一级行业，带进度条）
  if (rankList) {
    const allRanking = Array.from(allLv1Map.entries()).sort((a,b) => b[1]-a[1]);
    const maxCount = allRanking.length ? allRanking[0][1] : 1;
    if (!allRanking.length) {
      rankList.innerHTML = '<div class="muted">暂无数据</div>';
    } else {
      rankList.style.maxHeight = '480px';
      rankList.style.overflowY = 'auto';
      rankList.innerHTML = allRanking.map(([name, total]) => {
        const reported = src.filter(s => s.sw_lv1 === name && s.report_file).length;
        const barW = Math.max(4, Math.round((total / maxCount) * 100));
        const isActive = sw1 === name;
        return '<div class="rank-item" onclick="applyIndustryAnalysisFilter(\'' + esc(name) + '\',\'\',\'\')" ' +
          'style="' + (isActive ? 'border-color:#2563eb;background:#eff6ff;' : '') + 'flex-direction:column;align-items:stretch;padding:8px 12px;gap:4px;">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">' +
            '<span class="rank-name" style="font-size:13px;">' + esc(name) + '</span>' +
            '<span style="font-size:12px;color:#64748b;white-space:nowrap;flex-shrink:0;">' +
              (reported ? '<span style="color:#16a34a;font-weight:600;">' + reported + '篇报告</span> · ' : '') +
              total + '只' +
            '</span>' +
          '</div>' +
          '<div style="background:#e2e8f0;border-radius:3px;height:5px;overflow:hidden;">' +
            '<div style="background:' + (isActive ? '#2563eb' : '#93c5fd') + ';width:' + barW + '%;height:100%;border-radius:3px;transition:width .3s;"></div>' +
          '</div>' +
          '</div>';
      }).join('');
    }
  }

  // 搜索结果行业 + 选中行业股票预览
  if (preview) {
    const industryHtml = searchQuery
      ? '<div style="margin-bottom:10px;"><div style="font-size:12px;color:#64748b;margin-bottom:6px;">匹配行业</div><div style="display:flex;flex-wrap:wrap;gap:8px;">' + (matchedIndustries.length ? matchedIndustries.map(item => '<button onclick="applyIndustryAnalysisFilter(\'' + item.sw1.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\',\'' + item.sw2.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\',\'' + item.sw3.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\')" style="border:none;border-radius:999px;padding:4px 10px;background:#ecfeff;color:#155e75;cursor:pointer;font-size:12px;">' + esc(item.name) + '</button>').join('') : '<span class="muted">未找到匹配行业</span>') + '</div></div>'

    const selectedStocks = activeIndustry ? src.filter(s => s.sw_lv3 === activeIndustry || s.sw_lv2 === activeIndustry || s.sw_lv1 === activeIndustry || s.sw_industry === activeIndustry) : [];
    const list = selectedStocks.slice(0, 20);
    if (!activeIndustry) {
      preview.innerHTML = industryHtml + '<div class="muted">点击匹配行业后显示对应股票</div>';
    } else if (!list.length) {
      preview.innerHTML = industryHtml + '<div class="muted">暂无股票</div>';
    } else {
      preview.style.maxHeight = '480px';
      preview.style.overflowY = 'auto';
      preview.innerHTML = industryHtml + list.map(s => {
        const rating = s.rating || 0;
        const stars = rating > 0 ? '<span style="color:#f59e0b;font-size:11px;">' + '★'.repeat(rating) + '</span>' : '';
        const tag = s.sw_lv3 || s.sw_lv2 || s.sw_lv1 || '';
        return '<div onclick="goToBasicsStock(\'' + esc(s.code) + '\',\'' + esc(s.sw_lv1) + '\',\'' + esc(s.sw_lv2) + '\',\'' + esc(s.sw_lv3) + '\')" ' +
          'style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;border-bottom:1px solid #f1f5f9;" ' +
          'onmouseover="this.style.background=\'#eff6ff\'" onmouseout="this.style.background=\'transparent\'">' +
          '<div style="flex:1;min-width:0;">' +
            '<div style="display:flex;align-items:center;gap:6px;">' +
              '<span style="font-weight:500;color:#0f172a;font-size:13px;">' + esc(s.name) + '</span>' +
              (s.report_file ? '<span style="color:#16a34a;font-size:11px;" title="有报告">●</span>' : '') +
              stars +
            '</div>' +
            '<div style="font-size:11px;color:#94a3b8;margin-top:2px;">' + esc(s.full_code || s.code) + (tag ? ' · ' + esc(tag) : '') + '</div>' +
          '</div>' +
          '</div>';
      }).join('') +
      (selectedStocks.length > 20 ? '<div class="muted" style="text-align:center;padding:8px;font-size:12px;">…仅显示前20只，使用筛选查看更多</div>' : '');
    }
  }
}

function onAnalysisSw1Change(keepValues) {
