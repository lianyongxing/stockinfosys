name: Deploy static content to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r ann_report_web/requirements.txt

      - name: Generate data files
        run: |
          python -c "
          import json
          from pathlib import Path
          from datetime import datetime, timezone, timedelta
          import sys
          sys.path.insert(0, '.')
          from ann_report_web.merge_all import merge_all

          output_dir = Path('ann_report/output')
          merged_path = Path('ann_report_web/data/all_records.jsonl')
          merged_path.parent.mkdir(parents=True, exist_ok=True)
          records, update_time = merge_all(output_dir, merged_path)

          data = list(records)
          data.sort(key=lambda r: (r.get('_date', ''), r.get('stock_name', '')), reverse=True)
          output = {'records': data, 'update_time': update_time}
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False)
          print(f'data.json: {len(data)} records')
          "

      - name: Copy static files
        run: |
          cp ann_report_web/data/stock_basics.json .
          
      - name: Generate stockinfos index
        run: |
          python -c "
          import os
          from pathlib import Path
          
          stockinfos_dir = Path('stockinfos')
          if stockinfos_dir.exists():
            md_files = sorted(stockinfos_dir.glob('*.md'))
            items = []
            for f in md_files:
              name = f.stem
              with open(f, 'r', encoding='utf-8') as fp:
                content = fp.read()
              items.append({'name': name, 'file': f.name, 'content': content[:200]})
            
            html = '''<!DOCTYPE html>
<html>
<head><meta charset=\"UTF-8\"><title>股票研究报告</title>
<style>body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;max-width:800px;margin:0 auto;padding:20px;background:#f5f7fa;}
h1{color:#2c3e50;border-bottom:2px solid #3498db;padding-bottom:10px;}
.card{padding:15px;margin:10px 0;background:#fff;border-radius:8px;box-shadow:0 2px4px rgba(0,0,0,0.1);cursor:pointer;}
.card:hover{box-shadow:0 4px8px rgba(0,0,0,0.15);}
.card h2{margin:0 0 10px;color:#2c3e50;}
.card p{color:#666;font-size:14px;margin:0;}
.preview{white-space:pre-wrap;overflow:hidden;text-overflow:ellipsis;max-height:60px;}
.detail{display:none;padding:20px;background:#fff;border-radius:8px;margin-top:20px;}
.detail.active{display:block;}
.detail pre{white-space:pre-wrap;word-wrap:break-word;background:#f8f9fa;padding:15px;border-radius:4px;}
.back{background:#3498db;color:#fff;padding:10px 20px;border:none;border-radius:4px;cursor:pointer;}</style>
</head>
<body>
<h1>📊 股票研究报告</h1>
<div id=\"list\">'''
            for item in items:
              html += f'''<div class=\"card\" onclick=\"showDetail('{item['file']}')\"><h2>{item['name']}</h2><p class=\"preview\">{item['content'][:150]}...</p></div>'''
            
            html += '''</div>
<div id=\"detail\" class=\"detail\"></div>
<script>
const items = ''' + str(items).replace(\"'\", \"\\\\'\") + ''';
function showDetail(file) {
  const item = items.find(i => i.file === file);
  document.getElementById('list').style.display = 'none';
  const d = document.getElementById('detail');
  d.className = 'active';
  d.innerHTML = '<button class=\"back\" onclick=\"back()\">← 返回</button><pre>' + item.content + '</pre>';
}
function back() {
  document.getElementById('list').style.display = 'block';
  document.getElementById('detail').className = 'detail';
}
</script>
</body>
</html>'''
            with open('stockinfos.html', 'w', encoding='utf-8') as f:
              f.write(html)
            print(f'Generated stockinfos.html with {len(items)} stocks')
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4